function applyData(d){
  if(!d) { 
    initDefaultSections(); 
    buildTB(); 
    clearDayUI(); 
    return;

  // اهداف سالانه
  const goalsCont = document.getElementById('annualGoals');

}

// === ذخیره اهداف پایدار ===
function savePersistentGoals(){
  persistentGoals = Array.from(document.querySelectorAll('#annualGoals input[type=text]')).map(inp => inp.value);
  try {
    localStorage.setItem('aevPersistentGoals', JSON.stringify(persistentGoals));
  } catch(e){}
}

// === بارگذاری اولیه ===
function loadPersistentGoals(){
  try {
    const saved = localStorage.getItem('aevPersistentGoals');
    if(saved) persistentGoals = JSON.parse(saved);
  } catch(e){}
}

document.getElementById('jsonFile').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(){
    try{
      const imported = JSON.parse(reader.result);
      savedDays = imported.savedDays || imported;
      if(imported.persistentGoals) persistentGoals = imported.persistentGoals;
      
      localStorage.setItem('aevPlannerPro', JSON.stringify(savedDays));
      localStorage.setItem('aevPersistentGoals', JSON.stringify(persistentGoals));
      
      renderDaysNav();
      const key = fmtDate(currentDate);
      applyData(savedDays[key]);
      showToast('فایل JSON با موفقیت بارگذاری شد ✓');
    }catch(err){ alert('فایل معتبر نیست'); }
  };
  reader.readAsText(file);
});
